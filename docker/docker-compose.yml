services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aed_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    container_name: aed_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/aed_explorer
      ML_SERVICE_URL: http://ml-service:8001
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src:ro

  # ─── ML Service ─────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/ml-service.Dockerfile
      target: development
    container_name: aed_ml_service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      ENV: development
    volumes:
      - ../ml-service/app:/app/app:ro

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    container_name: aed_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ../frontend/src:/app/src:ro

volumes:
  postgres_data:
